services:
  admin-web:
    image: nginx:1.25-alpine
    depends_on:
      - admin-php
    ports:
      - "127.0.0.1:8081:80"
    volumes:
      - ..:/app:ro
      - ./nginx-admin.conf:/etc/nginx/conf.d/default.conf:ro

  admin-php:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        INSTALL_ADMIN_TOOLS: "true"
    working_dir: /app
    environment:
      SOCIAL_ADMIN_AREA_ENABLED: "1"
      SOCIAL_SITE_UPDATE_ENABLED: "1"
      SOCIAL_SITE_UPDATE_COMPOSE_FILE: "docker/docker-compose.yml"
      SOCIAL_SITE_UPDATE_COMPOSE_PROJECT: "rdbrr-public"
      SOCIAL_SITE_UPDATE_DOCKER_COMPOSE: "docker-compose"
    volumes:
      - ..:/app
      - /var/run/docker.sock:/var/run/docker.sock
